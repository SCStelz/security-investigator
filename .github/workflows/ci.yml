name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements-dev.txt
      - run: pytest --cov=. --cov-report=xml --cov-config=pyproject.toml
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build-mcp-apps:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [sentinel-geomap-server, sentinel-heatmap-server, sentinel-incident-comment]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd mcp-apps/${{ matrix.app }} && npm ci && npm run build
